services:
  - type: worker
    name: mcp-help-bot
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python main.py
    disk:
      name: bot-data
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: SLACK_BOT_TOKEN
        sync: false
      - key: SLACK_APP_TOKEN
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: NOTION_API_KEY
        sync: false
      - key: NOTION_DATABASE_ID
        sync: false
      - key: MCP_SERVER_URL
        sync: false
      - key: BOT_NAME
        sync: false
      - key: PRODUCT_NAME
        sync: false
      - key: OAUTH_CLIENT_ID
        sync: false
      - key: OAUTH_REDIRECT_URI
        sync: false
      - key: OAUTH_SCOPES
        sync: false
      - key: MCP_HELP_URL
        sync: false
      - key: DATA_DIR
        value: /var/data
      - key: PYTHON_VERSION
        value: "3.13.0"
